server:
  port: 9821
  shutdown_timeout: 30s

mysql:
  dsn: "root:root@tcp(mysql:3306)/npc_ai_admin?charset=utf8mb4&parseTime=true&loc=Local"
  max_open_conns: 50
  max_idle_conns: 10
  conn_max_lifetime: 5m

redis:
  addr: "redis:6379"
  password: ""
  db: 0

pagination:
  default_page: 1
  default_page_size: 20
  max_page_size: 100

validation:
  field_name_max_length: 64
  field_label_max_length: 128

event_type:
  name_max_length: 64
  display_name_max_length: 128
  cache_detail_ttl: 10m
  cache_list_ttl: 5m
  cache_lock_ttl: 3s

event_type_schema:
  field_name_max_length: 64
  field_label_max_length: 128
  max_schemas: 100
