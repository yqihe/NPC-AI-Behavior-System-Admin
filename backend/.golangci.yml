run:
  timeout: 5m
  tests: true
  build-tags: []

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - unused
    - gosimple
    - misspell
    - bodyclose
    - sqlclosecheck
    - rowserrcheck
    - gosec
    - revive
    - gocyclo
    - nakedret
    - prealloc
    - unconvert
    - unparam
  # gofmt/goimports are intentionally disabled: on Windows with
  # core.autocrlf=true they flag every file due to CRLF/LF mismatch.
  # Enable them in CI (Linux) via a separate config, or after adding a
  # .gitattributes that forces LF for Go files.

linters-settings:
  gocyclo:
    min-complexity: 20
  revive:
    rules:
      - name: exported
        disabled: true
      - name: package-comments
        disabled: true
      - name: var-naming
      - name: indent-error-flow
      - name: errorf
      - name: unreachable-code
      - name: redefines-builtin-id
  gosec:
    excludes:
      - G104
      - G304
  goimports:
    local-prefixes: github.com/yqihe/npc-ai-admin/backend

issues:
  exclude-dirs:
    - migrations
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - gocyclo
        - errcheck
        - unparam
    - path: cmd/seed/
      linters:
        - gosec
    # TODO: 迁移 SetNX → SetArgs(Mode:"NX")。v9 的 SetArgs 返回 (string,error)+redis.Nil，
    # 和现有 TryLock 的 (bool,error) 语义不同，需要 8 处谨慎改写 + 测试覆盖。
    - path: internal/store/redis/.*_cache\.go
      text: "SA1019.*SetNX is deprecated"
      linters:
        - staticcheck
    # G404: TTL 抖动仅用于缓存雪崩防护，非安全场景，math/rand 足够
    - path: internal/store/redis/shared/common\.go
      text: "G404.*weak random"
      linters:
        - gosec
  max-issues-per-linter: 0
  max-same-issues: 0
