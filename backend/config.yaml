server:
  port: 9821
  shutdown_timeout: 30s

mysql:
  dsn: "root:root@tcp(127.0.0.1:3306)/npc_ai_admin?charset=utf8mb4&parseTime=true&loc=Local"
  max_open_conns: 50
  max_idle_conns: 10
  conn_max_lifetime: 5m

redis:
  addr: "127.0.0.1:6379"
  password: ""
  db: 0

pagination:
  default_page: 1
  default_page_size: 20
  max_page_size: 100

validation:
  field_name_max_length: 64
  field_label_max_length: 128
  template_name_max_length: 64
  npc_name_max_length: 64
  description_max_length: 512

event_type:
  name_max_length: 64
  display_name_max_length: 128
  cache_detail_ttl: 10m
  cache_list_ttl: 5m
  cache_lock_ttl: 3s

event_type_schema:
  field_name_max_length: 64
  field_label_max_length: 128
  max_schemas: 100

fsm_config:
  name_max_length: 64
  display_name_max_length: 128
  max_states: 50
  max_transitions: 200
  condition_max_depth: 10
  cache_detail_ttl: 10m
  cache_list_ttl: 5m
  cache_lock_ttl: 3s

fsm_state_dict:
  name_max_length: 64
  display_name_max_length: 128
  category_max_length: 64
  description_max_length: 512

bt_tree:
  name_max_length: 128
  display_name_max_length: 128
  cache_detail_ttl: 10m
  cache_list_ttl: 5m
  cache_lock_ttl: 3s

bt_node_type:
  name_max_length: 64
  label_max_length: 128
  cache_detail_ttl: 30m
  cache_list_ttl: 15m
  cache_lock_ttl: 3s

region:
  name_max_length: 64
  display_name_max_length: 128
