services:
  mysql:
    image: mysql:8.0
    container_name: npc-admin-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: npc_ai_admin
      MYSQL_CHARSET: utf8mb4
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: npc-admin-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: npc-admin-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  admin-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: npc-admin-backend
    ports:
      - "9821:9821"
    volumes:
      - ./backend/config.docker.yaml:/app/config.yaml
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  admin-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: npc-admin-frontend
    ports:
      - "3000:80"
    depends_on:
      - admin-backend

volumes:
  mysql-data:
  redis-data:
  mongo-data:
