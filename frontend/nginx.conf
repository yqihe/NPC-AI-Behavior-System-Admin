server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # API 反代到后端
    location /api/ {
        proxy_pass http://admin-backend:9821;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA 前端路由
    location / {
        try_files $uri $uri/ /index.html;
    }
}
